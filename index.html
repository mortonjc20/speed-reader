<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="SpeedRead" />
<meta name="theme-color" content="#2b2b2b" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<title>Speed Reader</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }
  :root { --accent: #c45e00; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  #idle-screen { position: fixed; inset: 0; display: flex; flex-direction: column; opacity: 1; transition: opacity 0.6s; z-index: 10; }
  #idle-screen.hidden { opacity: 0; pointer-events: none; }
  #progress-bar-wrap { height: 4px; width: 100%; flex-shrink: 0; background: rgba(128,128,128,0.2); }
  #progress-bar-fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.3s; }
  #idle-text-area { flex: 1; overflow: hidden; padding: 1.4rem 1.1rem 1rem; font-family: 'Courier New', Courier, monospace; font-size: 16px; line-height: 1.9; word-break: break-word; position: relative; }
  #idle-text-inner { position: absolute; left: 1.1rem; right: 1.1rem; transition: transform 0.18s cubic-bezier(0.25,0.46,0.45,0.94); }
  .idle-word { display: inline; opacity: 0.22; transition: opacity 0.12s; position: relative; }
  .idle-word.current { opacity: 1; }
  .idle-word.bookmarked::after { content: ''; position: absolute; top: -3px; left: 50%; transform: translateX(-50%); width: 5px; height: 5px; border-radius: 50%; background: var(--accent); opacity: 0.9; }

  #taskbar { flex-shrink: 0; padding: 10px 14px env(safe-area-inset-bottom,10px); border-top: 0.5px solid rgba(128,128,128,0.3); display: flex; flex-direction: column; gap: 8px; }
  .tb-row { display: flex; align-items: center; gap: 8px; }
  .tb-label { font-size: 11px; min-width: 66px; opacity: 0.55; }
  .tb-val { font-size: 11px; min-width: 44px; font-weight: 600; text-align: right; }
  input[type="range"] { flex: 1; accent-color: var(--accent); cursor: pointer; }
  .swatches { display: flex; gap: 6px; align-items: center; }
  .swatch { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2.5px solid transparent; transition: border-color 0.2s, transform 0.15s; flex-shrink: 0; }
  .swatch:active { transform: scale(1.15); }
  .swatch.active { border-color: var(--accent); }
  .swatch-black { background: #0a0a0a; box-shadow: inset 0 0 0 0.5px #444; }
  .swatch-charcoal { background: #2b2b2b; }
  .swatch-parchment { background: #f5f0e8; box-shadow: inset 0 0 0 0.5px #c8b89a; }
  .swatch-white { background: #ffffff; box-shadow: inset 0 0 0 0.5px #bbb; }
  .toggles { display: flex; gap: 12px; flex-wrap: wrap; }
  .tog-label { display: flex; align-items: center; gap: 4px; font-size: 11px; opacity: 0.7; cursor: pointer; }
  input[type="checkbox"] { accent-color: var(--accent); width: 13px; height: 13px; cursor: pointer; }
  .tb-btn-row { display: flex; gap: 8px; }
  .tb-btn { flex: 1; padding: 7px 10px; border-radius: 8px; border: 0.5px solid rgba(128,128,128,0.35); background: transparent; font-size: 12px; font-weight: 500; cursor: pointer; transition: opacity 0.2s; text-align: center; }
  .tb-btn:active { opacity: 0.6; }
  .tb-btn.accent { border-color: var(--accent); color: var(--accent) !important; }
  .hint { font-size: 10px; text-align: center; opacity: 0.35; padding-bottom: 2px; }
  #bookmark-nav { display: none; align-items: center; gap: 6px; flex-wrap: wrap; }
  #bookmark-nav.visible { display: flex; }
  .bm-chip { font-size: 10px; padding: 3px 8px; border-radius: 10px; background: var(--accent); color: #fff; cursor: pointer; opacity: 0.85; display: flex; align-items: center; gap: 4px; }
  .bm-chip:active { opacity: 0.6; }
  .bm-x { font-size: 11px; opacity: 0.7; margin-left: 2px; }
  #bm-label { font-size: 11px; opacity: 0.45; }

  #toast { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #fff; font-size: 12px; font-weight: 500; padding: 7px 16px; border-radius: 20px; opacity: 0; transition: opacity 0.3s; z-index: 100; pointer-events: none; white-space: nowrap; }
  #toast.show { opacity: 1; }

  #active-screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.6s; z-index: 20; }
  #active-screen.visible { opacity: 1; }
  #lock-indicator { position: absolute; top: env(safe-area-inset-top, 18px); display: flex; align-items: center; gap: 6px; padding: 5px 13px; border-radius: 20px; font-size: 11px; font-weight: 500; letter-spacing: 0.03em; opacity: 0; transition: opacity 0.4s; pointer-events: none; border: 0.5px solid; margin-top: 8px; }
  #lock-indicator.visible { opacity: 0.55; }
  #lock-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1.8s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;}50%{opacity:0.3;} }
  #speed-hud { position: absolute; bottom: env(safe-area-inset-bottom, 28px); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; opacity: 0; transition: opacity 0.25s; pointer-events: none; }
  #speed-hud.visible { opacity: 0.75; }
  #speed-arrow { font-size: 18px; min-width: 20px; text-align: center; }
  #speed-hud-val { font-size: 14px; font-weight: 600; letter-spacing: 0.02em; }
  #rsvp-box { width: 92%; max-width: 520px; display: flex; flex-direction: column; align-items: center; position: relative; }
  .rsvp-guide { width: 100%; height: 1px; opacity: 0.3; }
  #rsvp-tick-top, #rsvp-tick-bot { position: absolute; width: 1px; opacity: 0.38; }
  #rsvp-tick-top { height: 10px; top: 1px; }
  #rsvp-tick-bot { height: 10px; bottom: 1px; }
  #rsvp-word-wrap { height: 80px; width: 100%; position: relative; display: flex; align-items: center; overflow: hidden; }
  #rsvp-word-inner { position: absolute; display: flex; align-items: center; white-space: nowrap; font-family: 'Courier New', Courier, monospace; font-size: 42px; font-weight: 500; }

  #paste-modal { display: none; position: fixed; inset: 0; z-index: 50; align-items: flex-end; justify-content: center; background: rgba(0,0,0,0.5); }
  #paste-modal.open { display: flex; }
  #paste-inner { width: 100%; max-width: 600px; border-radius: 16px 16px 0 0; padding: 16px 16px env(safe-area-inset-bottom,16px); display: flex; flex-direction: column; gap: 10px; }
  #paste-inner h3 { font-size: 15px; font-weight: 600; }
  #paste-textarea { width: 100%; height: 180px; border-radius: 10px; border: 0.5px solid rgba(128,128,128,0.3); background: transparent; padding: 10px 12px; font-family: 'Courier New', Courier, monospace; font-size: 14px; resize: none; user-select: text; -webkit-user-select: text; }
  .modal-btn-row { display: flex; gap: 8px; }
  .modal-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
  .modal-btn.primary { background: var(--accent); color: #fff; }
  .modal-btn.cancel { background: rgba(128,128,128,0.15); }
</style>
</head>
<body>

<div id="idle-screen">
  <div id="progress-bar-wrap"><div id="progress-bar-fill"></div></div>
  <div id="idle-text-area"><div id="idle-text-inner"></div></div>
  <div id="taskbar">
    <div class="tb-btn-row">
      <button class="tb-btn" id="paste-btn">Paste text</button>
      <button class="tb-btn" id="file-btn">Upload PDF / TXT</button>
      <input type="file" id="file-input" accept=".txt,.pdf" style="display:none;" />
    </div>
    <div class="tb-btn-row">
      <button class="tb-btn accent" id="bookmark-btn">&#9873; Bookmark here</button>
      <button class="tb-btn" id="clear-bm-btn">Clear bookmarks</button>
    </div>
    <div id="bookmark-nav"><span id="bm-label">Jump to:</span></div>
    <div class="tb-row">
      <span class="tb-label">Speed</span>
      <input type="range" id="wpm-slider" min="100" max="1000" step="10" value="300" />
      <span class="tb-val" id="wpm-out">300 wpm</span>
    </div>
    <div class="tb-row">
      <span class="tb-label">Font size</span>
      <input type="range" id="font-slider" min="20" max="60" step="2" value="42" />
      <span class="tb-val" id="font-out">42px</span>
    </div>
    <div class="tb-row">
      <span class="tb-label">Background</span>
      <div class="swatches">
        <div class="swatch swatch-black active" data-theme="black"></div>
        <div class="swatch swatch-charcoal" data-theme="charcoal"></div>
        <div class="swatch swatch-parchment" data-theme="parchment"></div>
        <div class="swatch swatch-white" data-theme="white"></div>
      </div>
    </div>
    <div class="tb-row">
      <div class="toggles">
        <label class="tog-label"><input type="checkbox" id="smart-cb" checked /> Smart mode</label>
        <label class="tog-label"><input type="checkbox" id="orp-cb" checked /> ORP</label>
        <label class="tog-label"><input type="checkbox" id="guide-cb" checked /> Guide lines</label>
      </div>
    </div>
    <div class="hint">hold to read · slide left/right to adjust speed · double-tap to lock</div>
  </div>
</div>

<div id="active-screen">
  <div id="lock-indicator"><div id="lock-dot"></div><span id="lock-label">locked — double-tap to exit</span></div>
  <div id="rsvp-box">
    <div class="rsvp-guide" id="rsvp-line-top"></div>
    <div id="rsvp-tick-top"></div>
    <div id="rsvp-word-wrap">
      <div id="rsvp-word-inner"><span id="rsvp-before"></span><span id="rsvp-orp"></span><span id="rsvp-after"></span></div>
    </div>
    <div id="rsvp-tick-bot"></div>
    <div class="rsvp-guide" id="rsvp-line-bot"></div>
  </div>
  <div id="speed-hud"><span id="speed-arrow"></span><span id="speed-hud-val"></span></div>
</div>

<div id="paste-modal">
  <div id="paste-inner">
    <h3>Paste your text</h3>
    <textarea id="paste-textarea" placeholder="Paste or type text here..."></textarea>
    <div class="modal-btn-row">
      <button class="modal-btn cancel" id="paste-cancel">Cancel</button>
      <button class="modal-btn primary" id="paste-confirm">Load text</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── Storage keys ──
const SK_PROGRESS='sr_progress', SK_BOOKMARKS='sr_bookmarks';

const themes={
  black:    {bg:'#0a0a0a',text:'#e8e8e8',orp:'#e03020',guide:'#e8e8e8',taskBg:'rgba(10,10,10,0.97)', border:'rgba(255,255,255,0.12)',btnColor:'#e8e8e8',lockBorder:'rgba(255,255,255,0.2)',lockText:'#e8e8e8',hudColor:'#e8e8e8'},
  charcoal: {bg:'#2b2b2b',text:'#e8e8e8',orp:'#e03020',guide:'#e8e8e8',taskBg:'rgba(35,35,35,0.97)', border:'rgba(255,255,255,0.12)',btnColor:'#e8e8e8',lockBorder:'rgba(255,255,255,0.2)',lockText:'#e8e8e8',hudColor:'#e8e8e8'},
  parchment:{bg:'#f5f0e8',text:'#2c1f0e',orp:'#cc2200',guide:'#2c1f0e',taskBg:'rgba(245,240,232,0.97)',border:'rgba(0,0,0,0.12)',btnColor:'#2c1f0e',lockBorder:'rgba(0,0,0,0.2)',lockText:'#2c1f0e',hudColor:'#2c1f0e'},
  white:    {bg:'#ffffff',text:'#1a1a1a',orp:'#cc2200',guide:'#1a1a1a',taskBg:'rgba(255,255,255,0.97)',border:'rgba(0,0,0,0.12)',btnColor:'#1a1a1a',lockBorder:'rgba(0,0,0,0.2)',lockText:'#1a1a1a',hudColor:'#1a1a1a'},
};

let currentTheme='black',words=[],wordEls=[],idx=0;
let holding=false,locked=false,rsvpTimer=null;
let lastTapTime=0,lastTouchTime=0;
let nudgeX=null,nudgeRafId=null,currentWpm=300;
let bookmarks=[],currentTextRaw='';
const DTAP=280,WPM_MIN=100,WPM_MAX=1000,DEAD_ZONE=0.25;

const $=id=>document.getElementById(id);
const idleScreen=$('idle-screen'),activeScreen=$('active-screen');
const idleTextArea=$('idle-text-area'),idleTextInner=$('idle-text-inner');
const progressFill=$('progress-bar-fill');
const wpmSlider=$('wpm-slider'),wpmOut=$('wpm-out');
const fontSlider=$('font-slider'),fontOut=$('font-out');
const smartCb=$('smart-cb'),orpCb=$('orp-cb'),guideCb=$('guide-cb');
const rsvpBefore=$('rsvp-before'),rsvpOrp=$('rsvp-orp'),rsvpAfter=$('rsvp-after');
const rsvpWordInner=$('rsvp-word-inner'),rsvpWordWrap=$('rsvp-word-wrap');
const rsvpLineTop=$('rsvp-line-top'),rsvpLineBot=$('rsvp-line-bot');
const rsvpTickTop=$('rsvp-tick-top'),rsvpTickBot=$('rsvp-tick-bot');
const lockIndicator=$('lock-indicator'),lockLabel=$('lock-label'),taskbar=$('taskbar');
const pasteModal=$('paste-modal'),pasteInner=$('paste-inner'),pasteTextarea=$('paste-textarea');
const speedHud=$('speed-hud'),speedArrow=$('speed-arrow'),speedHudVal=$('speed-hud-val');
const bookmarkNav=$('bookmark-nav'),bmLabel=$('bm-label'),toastEl=$('toast');

// ── Toast ──
let toastTimer=null;
function showToast(msg){toastEl.textContent=msg;toastEl.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>toastEl.classList.remove('show'),1800);}

// ── Hash ──
function hashText(text){let h=0;for(let i=0;i<Math.min(text.length,500);i++){h=(h*31+text.charCodeAt(i))>>>0;}return h.toString(36);}

// ── Persistence ──
function saveProgress(){if(!words.length)return;try{localStorage.setItem(SK_PROGRESS,JSON.stringify({hash:hashText(currentTextRaw),text:currentTextRaw,idx}));}catch(e){}}
function saveBookmarks(){try{localStorage.setItem(SK_BOOKMARKS,JSON.stringify({hash:hashText(currentTextRaw),marks:bookmarks}));}catch(e){}}
function loadPersisted(){
  try{
    const p=JSON.parse(localStorage.getItem(SK_PROGRESS)||'null');
    if(p&&p.text){
      currentTextRaw=p.text;words=tokenize(p.text);idx=Math.min(p.idx||0,words.length-1);
      const b=JSON.parse(localStorage.getItem(SK_BOOKMARKS)||'null');
      bookmarks=(b&&b.hash===hashText(currentTextRaw))?b.marks:[];
      buildIdleText(words);showToast('Progress restored — word '+(idx+1)+' of '+words.length);return true;
    }
  }catch(e){}return false;
}

// ── Stop RSVP ──
function stopRSVP(){clearTimeout(rsvpTimer);rsvpTimer=null;}

// ── Nudge ──
function nudgeLoop(){
  if(!holding||nudgeX===null){nudgeRafId=null;return;}
  const mid=window.innerWidth/2;const norm=(nudgeX-mid)/mid;const abs=Math.abs(norm);
  let rate=0;if(abs>DEAD_ZONE){const t=(abs-DEAD_ZONE)/(1-DEAD_ZONE);rate=(norm>0?1:-1)*t*150;}
  if(rate!==0){
    currentWpm=Math.max(WPM_MIN,Math.min(WPM_MAX,currentWpm+rate/60));
    const r=Math.round(currentWpm/10)*10;wpmSlider.value=r;wpmOut.textContent=r+' wpm';
    speedArrow.textContent=rate>0?'▶':'◀';speedHudVal.textContent=r+' wpm';
    speedHud.style.color=themes[currentTheme].hudColor;speedHud.classList.add('visible');
  }else{speedHud.classList.remove('visible');}
  nudgeRafId=requestAnimationFrame(nudgeLoop);
}
function startNudge(x){nudgeX=x;if(!nudgeRafId)nudgeRafId=requestAnimationFrame(nudgeLoop);}
function updateNudge(x){nudgeX=x;}
function stopNudge(){nudgeX=null;cancelAnimationFrame(nudgeRafId);nudgeRafId=null;speedHud.classList.remove('visible');}

// ── Theme ──
function applyTheme(name){
  currentTheme=name;const t=themes[name];
  document.body.style.background=t.bg;document.documentElement.style.background=t.bg;
  idleScreen.style.background=t.bg;activeScreen.style.background=t.bg;
  idleTextInner.style.color=t.text;taskbar.style.background=t.taskBg;taskbar.style.borderTopColor=t.border;
  pasteInner.style.background=t.taskBg;pasteTextarea.style.color=t.text;
  pasteInner.querySelector('h3').style.color=t.text;
  document.querySelectorAll('.tb-label,.tb-val,.tog-label,.hint,#bm-label').forEach(el=>el.style.color=t.text);
  document.querySelectorAll('.tb-btn').forEach(el=>{el.style.color=t.btnColor;el.style.borderColor=t.border;});
  $('bookmark-btn').style.color=null;$('bookmark-btn').style.borderColor=null;
  document.querySelectorAll('.modal-btn.cancel').forEach(el=>el.style.color=t.text);
  rsvpLineTop.style.background=rsvpLineBot.style.background=t.guide;
  rsvpTickTop.style.background=rsvpTickBot.style.background=t.guide;
  rsvpBefore.style.color=rsvpAfter.style.color=t.text;rsvpOrp.style.color=t.orp;
  lockIndicator.style.borderColor=t.lockBorder;lockLabel.style.color=t.lockText;
  speedHudVal.style.color=speedArrow.style.color=t.hudColor;
  document.querySelectorAll('.swatch').forEach(s=>s.classList.toggle('active',s.dataset.theme===name));
  if(words.length)buildIdleText(words);
}
document.querySelectorAll('.swatch').forEach(s=>s.addEventListener('click',e=>{e.stopPropagation();applyTheme(s.dataset.theme);}));

// ── Helpers ──
function tokenize(text){return text.split(/\s+/).filter(w=>w.length>0).flatMap(w=>w.split('-').filter(p=>p.length>0));}
function getORPIndex(word){const len=word.replace(/[^a-zA-Z]/g,'').length;if(len<=2)return 0;if(len<=5)return 1;if(len<=9)return 2;if(len<=13)return 3;return 4;}
function getORPCharPos(word){const oi=getORPIndex(word);let cc=-1;for(let i=0;i<word.length;i++){if(/[a-zA-Z]/.test(word[i])){cc++;if(cc===oi)return i;}}return -1;}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── Bookmarks ──
function renderBookmarkNav(){
  Array.from(bookmarkNav.querySelectorAll('.bm-chip')).forEach(el=>el.remove());
  if(!bookmarks.length){bookmarkNav.classList.remove('visible');return;}
  bookmarkNav.classList.add('visible');
  [...new Set(bookmarks)].sort((a,b)=>a-b).forEach((bi,n)=>{
    const chip=document.createElement('div');chip.className='bm-chip';
    const pct=words.length?Math.round((bi/words.length)*100):0;
    chip.innerHTML='#'+(n+1)+' <span style="opacity:0.7">'+pct+'%</span><span class="bm-x">×</span>';
    chip.addEventListener('click',e=>{
      e.stopPropagation();
      if(e.target.classList.contains('bm-x')){bookmarks=bookmarks.filter(x=>x!==bi);saveBookmarks();renderBookmarkNav();markBookmarkedWords();showToast('Bookmark removed');}
      else{idx=bi;highlightIdleWord(idx);showToast('Jumped to bookmark #'+(n+1));}
    });
    bookmarkNav.appendChild(chip);
  });
}
function markBookmarkedWords(){wordEls.forEach((el,i)=>el.classList.toggle('bookmarked',bookmarks.includes(i)));}

// ── Build idle text ──
function buildIdleText(ws){
  const t=themes[currentTheme];idleTextInner.innerHTML='';wordEls=[];
  ws.forEach(w=>{
    const span=document.createElement('span');span.className='idle-word';span.style.color=t.text;
    if(orpCb.checked){const op=getORPCharPos(w);if(op>=0){span.innerHTML=escHtml(w.slice(0,op))+'<span style="color:'+t.orp+'">'+escHtml(w[op])+'</span>'+escHtml(w.slice(op+1));}else{span.textContent=w;}}
    else{span.textContent=w;}
    idleTextInner.appendChild(span);idleTextInner.appendChild(document.createTextNode(' '));wordEls.push(span);
  });
  markBookmarkedWords();renderBookmarkNav();highlightIdleWord(idx);
}
function highlightIdleWord(i){
  wordEls.forEach((el,j)=>el.style.opacity=j===i?'1':'0.22');
  progressFill.style.width=(words.length?Math.round((i/words.length)*100):0)+'%';
  scrollToWord(i);
}
function scrollToWord(i){
  if(!wordEls[i])return;
  const areaH=idleTextArea.getBoundingClientRect().height;
  const target=-(wordEls[i].offsetTop-areaH/2+wordEls[i].offsetHeight/2);
  idleTextInner.style.transform='translateY('+Math.min(0,target)+'px)';
}

// ── Scroll nav ──
let wheelAccum=0,wheelTimer=null;
idleTextArea.addEventListener('wheel',e=>{
  e.preventDefault();wheelAccum+=e.deltaY;
  const steps=Math.trunc(wheelAccum/60);
  if(steps!==0){wheelAccum-=steps*60;idx=Math.max(0,Math.min(idx+steps,words.length-1));highlightIdleWord(idx);}
  clearTimeout(wheelTimer);wheelTimer=setTimeout(()=>{wheelAccum=0;},200);
},{passive:false});
let touchScrollY=null,touchScrollAccum=0;
idleTextArea.addEventListener('touchstart',e=>{if(e.target.closest('#taskbar'))return;touchScrollY=e.touches[0].clientY;touchScrollAccum=0;},{passive:true});
idleTextArea.addEventListener('touchmove',e=>{
  if(touchScrollY===null)return;e.preventDefault();
  const dy=touchScrollY-e.touches[0].clientY;touchScrollAccum+=dy;touchScrollY=e.touches[0].clientY;
  const steps=Math.trunc(touchScrollAccum/28);
  if(steps!==0){touchScrollAccum-=steps*28;idx=Math.max(0,Math.min(idx+steps,words.length-1));highlightIdleWord(idx);}
},{passive:false});
idleTextArea.addEventListener('touchend',()=>{touchScrollY=null;touchScrollAccum=0;});

// ── RSVP ──
function positionRSVP(word){
  const t=themes[currentTheme];const op=getORPCharPos(word);
  if(!orpCb.checked||op===-1){rsvpBefore.textContent=word;rsvpOrp.textContent='';rsvpAfter.textContent='';rsvpWordInner.style.left='50%';rsvpWordInner.style.transform='translateX(-50%)';return;}
  rsvpBefore.textContent=word.slice(0,op);rsvpOrp.textContent=word[op];rsvpAfter.textContent=word.slice(op+1);
  rsvpBefore.style.color=rsvpAfter.style.color=t.text;rsvpOrp.style.color=t.orp;
  const fs=parseInt(fontSlider.value);const cv=document.createElement('canvas');const ctx=cv.getContext('2d');
  ctx.font='500 '+fs+'px "Courier New",monospace';
  const bw=ctx.measureText(rsvpBefore.textContent).width;const ow=ctx.measureText(rsvpOrp.textContent).width;
  const boxW=rsvpWordWrap.getBoundingClientRect().width||window.innerWidth*0.9;const anchor=boxW*0.5;
  rsvpWordInner.style.left=(anchor-bw-ow/2)+'px';rsvpWordInner.style.transform='none';
  rsvpTickTop.style.left=rsvpTickBot.style.left=anchor+'px';
}
function getSmartDelay(word){
  const wpm=Math.max(WPM_MIN,Math.min(WPM_MAX,currentWpm));const base=60000/wpm;
  if(!smartCb.checked)return base;
  const len=word.replace(/[^a-zA-Z]/g,'').length;
  return base*(len<=4?0.85:len<=7?1.0:len<=10?1.3:1.6);
}
function rsvpTick(){
  if(!holding&&!locked)return;
  if(idx>=words.length){stopRSVP();holding=false;locked=false;stopNudge();saveProgress();showIdle();return;}
  positionRSVP(words[idx]);highlightIdleWord(idx);
  const delay=getSmartDelay(words[idx]);idx++;
  rsvpTimer=setTimeout(rsvpTick,delay);
}

// ── Mode switching ──
function showActive(){activeScreen.style.background=themes[currentTheme].bg;idleScreen.classList.add('hidden');activeScreen.classList.add('visible');}
function showIdle(){activeScreen.classList.remove('visible');idleScreen.classList.remove('hidden');lockIndicator.classList.remove('visible');}
function enterLock(){locked=true;if(idx>=words.length)idx=0;showActive();lockIndicator.classList.add('visible');stopRSVP();rsvpTick();}
function exitLock(){stopRSVP();locked=false;saveProgress();showIdle();}
function startHold(x){if(!words.length)return;if(idx>=words.length)idx=0;holding=true;showActive();stopRSVP();currentWpm=parseInt(wpmSlider.value);startNudge(x);rsvpTick();}
function stopHold(){stopRSVP();stopNudge();holding=false;saveProgress();showIdle();}

// ── Input ──
document.addEventListener('mousedown',e=>{
  if(e.target.closest('#taskbar')||e.target.closest('#paste-modal'))return;
  const now=Date.now();const gap=now-lastTapTime;lastTapTime=now;
  if(gap<DTAP){lastTapTime=0;if(locked){exitLock();}else{stopHold();enterLock();}return;}
  if(locked)return;startHold(e.clientX);
});
document.addEventListener('mousemove',e=>{if(holding)updateNudge(e.clientX);});
document.addEventListener('mouseup',()=>{if(locked)return;if(!holding)return;stopHold();});
document.addEventListener('mouseleave',()=>{if(locked)return;if(!holding)return;stopHold();});
document.addEventListener('touchstart',e=>{
  if(e.target.closest('#taskbar')||e.target.closest('#paste-modal'))return;
  const now=Date.now();const gap=now-lastTouchTime;lastTouchTime=now;
  if(gap<DTAP){lastTouchTime=0;e.preventDefault();if(locked){exitLock();}else{stopHold();enterLock();}return;}
  if(locked)return;startHold(e.touches[0].clientX);
},{passive:false});
document.addEventListener('touchmove',e=>{if(holding)updateNudge(e.touches[0].clientX);},{passive:true});
document.addEventListener('touchend',()=>{if(locked)return;if(!holding)return;stopHold();});
document.addEventListener('touchcancel',()=>{if(locked)return;if(!holding)return;stopHold();});

// ── Controls ──
wpmSlider.addEventListener('input',e=>{e.stopPropagation();const v=parseInt(wpmSlider.value);currentWpm=v;wpmOut.textContent=v+' wpm';});
fontSlider.addEventListener('input',e=>{e.stopPropagation();const sz=fontSlider.value;fontOut.textContent=sz+'px';rsvpWordInner.style.fontSize=sz+'px';idleTextInner.style.fontSize=Math.max(13,Math.round(sz*0.4))+'px';});
orpCb.addEventListener('change',()=>{if(words.length)buildIdleText(words);});
guideCb.addEventListener('change',()=>{const v=guideCb.checked?'':'none';[rsvpLineTop,rsvpLineBot,rsvpTickTop,rsvpTickBot].forEach(el=>el.style.display=v);});

// ── Bookmarks ──
$('bookmark-btn').addEventListener('click',e=>{
  e.stopPropagation();if(!words.length)return;
  if(bookmarks.includes(idx)){showToast('Already bookmarked here');return;}
  bookmarks.push(idx);saveBookmarks();markBookmarkedWords();renderBookmarkNav();
  showToast('Bookmark added at '+Math.round((idx/words.length)*100)+'%');
});
$('clear-bm-btn').addEventListener('click',e=>{
  e.stopPropagation();if(!bookmarks.length){showToast('No bookmarks to clear');return;}
  bookmarks=[];saveBookmarks();markBookmarkedWords();renderBookmarkNav();showToast('Bookmarks cleared');
});

// ── Load ──
function loadWords(raw){
  currentTextRaw=raw;words=tokenize(raw);idx=0;bookmarks=[];
  try{const b=JSON.parse(localStorage.getItem(SK_BOOKMARKS)||'null');if(b&&b.hash===hashText(raw))bookmarks=b.marks;}catch(e){}
  buildIdleText(words);saveProgress();
}

$('paste-btn').addEventListener('click',e=>{e.stopPropagation();pasteModal.classList.add('open');pasteTextarea.focus();});
$('paste-cancel').addEventListener('click',e=>{e.stopPropagation();pasteModal.classList.remove('open');});
$('paste-confirm').addEventListener('click',e=>{
  e.stopPropagation();const raw=pasteTextarea.value.trim();if(!raw)return;
  loadWords(raw);pasteModal.classList.remove('open');pasteTextarea.value='';
});
$('file-btn').addEventListener('click',e=>{e.stopPropagation();$('file-input').click();});
$('file-input').addEventListener('change',async e=>{
  const file=e.target.files[0];if(!file)return;
  if(file.name.endsWith('.txt')){loadWords(await file.text());}
  else if(file.name.endsWith('.pdf')){
    try{const buf=await file.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    let t='';for(let p=1;p<=pdf.numPages;p++){const pg=await pdf.getPage(p);const c=await pg.getTextContent();t+=c.items.map(i=>i.str).join(' ')+' ';}
    loadWords(t.trim());}catch(err){alert('Could not read PDF. Try a .txt file.');}
  }
  e.target.value='';
});

// ── PWA service worker ──
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// ── Init ──
const sample="Welcome to Speed Reader. Hold the screen to begin reading. Release to pause. While holding slide left or right to change speed. Double-tap to lock reading mode. Use the bookmark button to save your position — bookmarks and progress are saved automatically and restored when you reopen the app. Scroll up or down to navigate one word at a time. Use the taskbar to adjust speed, font size, background colour, and other options. Load your own text using the Paste text or Upload buttons above.";
applyTheme('black');
if(!loadPersisted()){loadWords(sample);}
currentWpm=parseInt(wpmSlider.value);
wpmOut.textContent=wpmSlider.value+' wpm';
fontOut.textContent=fontSlider.value+'px';
rsvpWordInner.style.fontSize=fontSlider.value+'px';
</script>
</body>
</html>
